name: deploy-admin

# Deploys the admin control plane (admin.morcos.tech) to the `admin` namespace.
# Owns the push:admin/** trigger. DEPLOYMENT_TOKEN carries sub=admin, matching
# the `admin` projects row.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["admin/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infrastructure deployment
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          repository: markmorcos/infrastructure
          event-type: deploy-admin
          client-payload: |-
            {
              "repository": "markmorcos/infrastructure",
              "token": "${{ secrets.DEPLOYMENT_TOKEN }}",
              "version": "${{ github.sha }}",
              "config_file": "admin/deployment.yaml",
              "migrations": {
                "dir": "admin/sql/migrations",
                "secret": "database-secrets",
                "namespace": "admin",
                "key": "DATABASE_URL"
              }
            }
