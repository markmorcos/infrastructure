name: deploy-app

on:
  repository_dispatch:
    types:
      - deploy-mcpforge node
      - deploy-onetrick
      - deploy-mcpforge
      - deploy-booking
      - deploy-cms
      - deploy-datewithmark
      - deploy-essenteil
      - deploy-eventlane
      - deploy-experimentation
      - deploy-games
      - deploy-infrastructure-admin
      - deploy-lea
      - deploy-ma3ady
      - deploy-naharda-analytics
      - deploy-naharda-api
      - deploy-naharda-web
      - deploy-portfolio
      - deploy-pile
      - deploy-scrum-poker
      - deploy-secrets
      - deploy-stminaconnect
      - deploy-stream
      - deploy-tazaker
      - deploy-urbansportsclub
      - deploy-url-shortener
      - deploy-watch
      - deploy-whiteboard

jobs:
  # Build each architecture on its own NATIVE runner — no QEMU, so esbuild / the
  # Astro compiler / other native build tools don't crash. Each pushes a per-arch
  # tag (…-amd64 / …-arm64).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          path: client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.INFRASTRUCTURE_PAT }}

      - name: Configure VPN
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Build and push ${{ matrix.arch }}
        run: |
          STAGE=build \
          PLATFORMS=linux/${{ matrix.arch }} \
          TAG_SUFFIX=-${{ matrix.arch }} \
          KUBECONFIG=~/.kube/config \
          DEPLOYMENT_VERSION=${{ github.event.client_payload.version }} \
          CONFIG_FILE="client/${{ github.event.client_payload.config_file }}" \
          bash scripts/build.sh

  # Stitch the per-arch tags into one multi-arch manifest (registry-only op).
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          path: client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.INFRASTRUCTURE_PAT }}

      - name: Merge multi-arch manifests
        run: |
          STAGE=merge \
          DEPLOYMENT_VERSION=${{ github.event.client_payload.version }} \
          CONFIG_FILE="client/${{ github.event.client_payload.config_file }}" \
          bash scripts/build.sh

  # Apply database migrations before rollout. Opt-in: only runs when the client
  # payload carries a `migrations` object. Pulls DATABASE_URL from the cluster
  # secret it names, then applies the repo's idempotent migration files.
  migrate:
    if: ${{ github.event.client_payload.migrations }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          path: client

      # Install before joining the tailnet so apt uses the runner's normal DNS.
      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      # accept-dns is required so postgres.morcos.lan resolves via the tailnet
      # split-DNS nameserver.
      - name: Configure VPN
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
          args: --accept-dns=true

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run migrations
        env:
          KUBECONFIG: /home/runner/.kube/config
          MIGRATIONS: ${{ toJson(github.event.client_payload.migrations) }}
        run: |
          ns=$(echo "$MIGRATIONS" | jq -r '.namespace')
          secret=$(echo "$MIGRATIONS" | jq -r '.secret')
          key=$(echo "$MIGRATIONS" | jq -r '.key')
          dir=$(echo "$MIGRATIONS" | jq -r '.dir')
          DATABASE_URL=$(kubectl get secret "$secret" -n "$ns" \
            -o jsonpath="{.data.$key}" | base64 --decode)
          export DATABASE_URL
          MIGRATIONS_DIR="client/$dir" bash scripts/migrate.sh

  deploy:
    needs: [merge, migrate]
    if: ${{ always() && needs.merge.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          path: client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.INFRASTRUCTURE_PAT }}

      - name: Configure VPN
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy services using Helm
        run: |
          KUBECONFIG=~/.kube/config \
          GHCR_PAT=${{ secrets.INFRASTRUCTURE_PAT }} \
          DEPLOYMENT_TOKEN=${{ github.event.client_payload.token }} \
          DEPLOYMENT_VERSION=${{ github.event.client_payload.version }} \
          CONFIG_FILE="client/${{ github.event.client_payload.config_file }}" \
          bash scripts/deploy.sh
