name: deploy-app

on:
  repository_dispatch:
    types:
      - deploy-booking
      - deploy-essenteil
      - deploy-eventlane
      - deploy-experimentation
      - deploy-games
      - deploy-infrastructure-admin
      - deploy-ma3ady
      - deploy-naharda-analytics
      - deploy-naharda-api
      - deploy-naharda-web
      - deploy-portfolio
      - deploy-pile
      - deploy-scrum-poker
      - deploy-secrets
      - deploy-stminaconnect
      - deploy-stream
      - deploy-tazaker
      - deploy-urbansportsclub
      - deploy-url-shortener
      - deploy-watch
      - deploy-whiteboard

jobs:
  # Build each architecture on its own NATIVE runner — no QEMU, so esbuild / the
  # Astro compiler / other native build tools don't crash. Each pushes a per-arch
  # tag (…-amd64 / …-arm64).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          path: client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.INFRASTRUCTURE_PAT }}

      - name: Configure VPN
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Build and push ${{ matrix.arch }}
        run: |
          STAGE=build \
          PLATFORMS=linux/${{ matrix.arch }} \
          TAG_SUFFIX=-${{ matrix.arch }} \
          KUBECONFIG=~/.kube/config \
          DEPLOYMENT_VERSION=${{ github.event.client_payload.version }} \
          CONFIG_FILE="client/${{ github.event.client_payload.config_file }}" \
          bash scripts/build.sh

  # Stitch the per-arch tags into one multi-arch manifest (registry-only op).
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          path: client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.INFRASTRUCTURE_PAT }}

      - name: Merge multi-arch manifests
        run: |
          STAGE=merge \
          DEPLOYMENT_VERSION=${{ github.event.client_payload.version }} \
          CONFIG_FILE="client/${{ github.event.client_payload.config_file }}" \
          bash scripts/build.sh

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          path: client

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.INFRASTRUCTURE_PAT }}

      - name: Configure VPN
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy services using Helm
        run: |
          KUBECONFIG=~/.kube/config \
          DEPLOYMENT_TOKEN=${{ github.event.client_payload.token }} \
          DEPLOYMENT_VERSION=${{ github.event.client_payload.version }} \
          CONFIG_FILE="client/${{ github.event.client_payload.config_file }}" \
          bash scripts/deploy.sh
