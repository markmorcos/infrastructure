name: deploy-infrastructure-admin

# DEPRECATED: superseded by deploy-admin.yaml (infrastructure-admin -> admin
# rename). Push trigger removed so it no longer fires; kept dispatch-only as a
# rollback escape hatch until teardown deletes it.
on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infrastructure deployment
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          repository: markmorcos/infrastructure
          event-type: deploy-infrastructure-admin
          client-payload: |-
            {
              "repository": "markmorcos/infrastructure",
              "token": "${{ secrets.DEPLOYMENT_TOKEN }}",
              "version": "${{ github.sha }}",
              "config_file": "admin/deployment.yaml",
              "migrations": {
                "dir": "admin/sql/migrations",
                "secret": "database-secrets",
                "namespace": "infrastructure-admin",
                "key": "DATABASE_URL"
              }
            }
