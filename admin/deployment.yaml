version: 0.8.0

namespace: infrastructure-admin
project: infrastructure-admin

services:
  - name: infrastructure-admin
    image: ghcr.io/markmorcos/infrastructure-admin
    context: admin
    port: 3000
    serviceAccountName: infrastructure-admin
    env:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database-secrets
            key: DATABASE_URL
      - name: JWT_SECRET
        valueFrom:
          secretKeyRef:
            name: jwt-secret
            key: JWT_SECRET
      - name: GITHUB_PAT
        valueFrom:
          secretKeyRef:
            name: github-credentials
            key: GITHUB_PAT
      # Admin Redis connection used by the provisioner to create per-app ACL users.
      - name: REDIS_ADMIN_URL
        valueFrom:
          secretKeyRef:
            name: redis-admin
            key: REDIS_ADMIN_URL

      # CMS asset storage (MinIO). Endpoint/bucket/CDN are literals; keys come
      # from cms-secrets (copied into this namespace). Endpoint goes through the
      # in-cluster ExternalName alias (k8s/04-data-services.yaml).
      - name: S3_ENDPOINT
        value: minio.data.svc.cluster.local:9000
      - name: S3_BUCKET
        value: cms
      - name: S3_PUBLIC_BASE_URL
        value: https://cdn.morcos.tech
      - name: S3_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: S3_ACCESS_KEY
      - name: S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: S3_SECRET_KEY
    ingress:
      host: admin.morcos.tech
      path: /
      pathType: Prefix
