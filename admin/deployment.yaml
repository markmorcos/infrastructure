version: 0.8.0

namespace: admin
project: admin

services:
  - name: admin
    image: ghcr.io/markmorcos/admin
    context: admin
    port: 3000
    serviceAccountName: admin
    env:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database-secrets
            key: DATABASE_URL
      - name: JWT_SECRET
        valueFrom:
          secretKeyRef:
            name: jwt-secret
            key: JWT_SECRET
      # Shared secret guarding the internal CMS service API (single write path,
      # called by the admin console and the practa product).
      - name: CMS_SERVICE_SECRET
        valueFrom:
          secretKeyRef:
            name: cms-service-secret
            key: CMS_SERVICE_SECRET
      - name: GITHUB_PAT
        valueFrom:
          secretKeyRef:
            name: github-credentials
            key: GITHUB_PAT
      # Verifies inbound GitHub webhooks (builds live updates). Optional so admin
      # boots without it; webhooks are rejected until the secret is set.
      - name: GITHUB_WEBHOOK_SECRET
        valueFrom: { secretKeyRef: { name: github-webhook, key: GITHUB_WEBHOOK_SECRET, optional: true } }
      # Admin Redis connection used by the provisioner to create per-app ACL users.
      - name: REDIS_ADMIN_URL
        valueFrom:
          secretKeyRef:
            name: redis-admin
            key: REDIS_ADMIN_URL

      # CMS asset storage (MinIO). Endpoint/bucket/CDN are literals; keys come
      # from cms-secrets (copied into this namespace). Endpoint goes through the
      # in-cluster ExternalName alias (k8s/04-data-services.yaml).
      - name: S3_ENDPOINT
        value: minio.data.svc.cluster.local:9000
      - name: S3_BUCKET
        value: cms
      - name: S3_PUBLIC_BASE_URL
        value: https://cdn.morcos.tech
      - name: S3_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: S3_ACCESS_KEY
      - name: S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: S3_SECRET_KEY

      # Cloudflare R2 (off-box backups) — the Backups console lists objects here
      # and spawns restore Jobs. Copied from the backups namespace's backup-r2.
      - name: R2_ENDPOINT
        valueFrom: { secretKeyRef: { name: backup-r2, key: R2_ENDPOINT, optional: true } }
      - name: R2_BUCKET
        valueFrom: { secretKeyRef: { name: backup-r2, key: R2_BUCKET, optional: true } }
      - name: R2_ACCESS_KEY
        valueFrom: { secretKeyRef: { name: backup-r2, key: R2_ACCESS_KEY, optional: true } }
      - name: R2_SECRET_KEY
        valueFrom: { secretKeyRef: { name: backup-r2, key: R2_SECRET_KEY, optional: true } }

      # Resend transactional email for contact-form notifications. Optional so
      # admin boots without it; submissions are still stored, just not emailed,
      # until the `resend` secret is created (sender domain must be verified in
      # Resend).
      - name: RESEND_API_KEY
        valueFrom: { secretKeyRef: { name: resend, key: RESEND_API_KEY, optional: true } }
      - name: RESEND_SENDER_EMAIL
        valueFrom: { secretKeyRef: { name: resend, key: RESEND_SENDER_EMAIL, optional: true } }
      - name: RESEND_SENDER_NAME
        valueFrom: { secretKeyRef: { name: resend, key: RESEND_SENDER_NAME, optional: true } }

      # OIDC (Zitadel) login — enables /api/auth/oidc/start + /api/auth/callback as an
      # ALTERNATE login that mints the same `token` session cookie. The password login
      # stays the live default; enabling these routes does not change it. Client ID is a
      # public PKCE client (no secret). Cutover to OIDC-by-default happens later.
      - name: AUTH_OIDC_ENABLED
        value: "true"
      - name: AUTH_OIDC_ISSUER
        value: https://auth.morcos.tech
      - name: AUTH_OIDC_CLIENT_ID
        value: "379583189284356153"
      - name: AUTH_OIDC_REDIRECT_URI
        value: https://admin.morcos.tech/api/auth/callback
    # GeoLite2 IP→country: the app reads the .mmdb from the private `geoip` MinIO
    # bucket via the existing S3_* creds (no MaxMind calls). The geoip-update
    # CronJob (k8s/08-geoip-update.yaml) refreshes that bucket weekly.
    ingress:
      host: admin.morcos.tech
      path: /
      pathType: Prefix
