{{- range .Values.services }}
{{- if .networkPolicy }}
{{- $resourceName := printf "%s-%s" $.Values.namespace .name }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $resourceName }}-netpol
  namespace: {{ $.Values.namespace }}
spec:
  # Defaults to this service's own pods; override with .networkPolicy.podSelector.
  podSelector:
{{- if .networkPolicy.podSelector }}
{{ toYaml .networkPolicy.podSelector | indent 4 }}
{{- else }}
    matchLabels:
      app: {{ $resourceName }}
{{- end }}
  policyTypes:
{{- if .networkPolicy.ingress }}
    - Ingress
{{- end }}
{{- if .networkPolicy.egress }}
    - Egress
{{- end }}
{{- if .networkPolicy.ingress }}
  ingress:
{{ toYaml .networkPolicy.ingress | indent 4 }}
{{- end }}
{{- if .networkPolicy.egress }}
  egress:
{{ toYaml .networkPolicy.egress | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
