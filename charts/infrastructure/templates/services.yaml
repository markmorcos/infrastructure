{{- range .Values.services }}
{{- $resourceName := printf "%s-%s" $.Values.namespace .name }}
{{- $ports := .ports }}
{{- if and (not .ports) .port }}
{{- $ports = list (dict "port" .port) }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $resourceName }}-deployment
  namespace: {{ $.Values.namespace }}
spec:
  replicas: {{ .replicas | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ $resourceName }}
  template:
    metadata:
      labels:
        app: {{ $resourceName }}
        build-timestamp: '{{ now | date "20060102150405" }}'
    spec:
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecret | default "ghcr-pull" }}
{{- if .serviceAccountName }}
      serviceAccountName: {{ .serviceAccountName }}
{{- end }}
{{- if .terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .terminationGracePeriodSeconds }}
{{- end }}
{{- if .volumes }}
      volumes:
{{- range .volumes }}
        - name: {{ .name }}
{{- if hasKey . "secret" }}
          secret:
{{ toYaml .secret | indent 12 }}
{{- else if hasKey . "configMap" }}
          configMap:
{{ toYaml .configMap | indent 12 }}
{{- else if hasKey . "emptyDir" }}
          emptyDir:
{{ toYaml .emptyDir | indent 12 }}
{{- else if hasKey . "hostPath" }}
          hostPath:
{{ toYaml .hostPath | indent 12 }}
{{- end }}
{{- end }}
{{- end }}
      containers:
        - name: {{ .name }}
          image: "{{ .image }}:{{ .tag | default (printf "%s-latest" $.Values.namespace) }}"
          imagePullPolicy: {{ .pullPolicy | default "Always" }}
{{- if .args }}
          args:
{{ toYaml .args | indent 12 }}
{{- end }}
{{- if .env }}
          env:
{{ toYaml .env | indent 12 }}
{{- end }}
{{- if .volumes }}
          volumeMounts:
{{- range .volumes }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
{{- if hasKey . "readOnly" }}
              readOnly: {{ .readOnly }}
{{- end }}
{{- end }}
{{- end }}
{{- if .resources }}
          resources:
{{ toYaml .resources | indent 12 }}
{{- end }}
{{- if .startupProbe }}
          startupProbe:
{{ toYaml .startupProbe | indent 12 }}
{{- end }}
{{- if .livenessProbe }}
          livenessProbe:
{{ toYaml .livenessProbe | indent 12 }}
{{- end }}
{{- if .readinessProbe }}
          readinessProbe:
{{ toYaml .readinessProbe | indent 12 }}
{{- end }}

{{- if $ports }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $resourceName }}-service
spec:
  selector:
    app: {{ $resourceName }}
  ports:
{{- range $ports }}
    - name: {{ .name | default "http" }}
      protocol: {{ .protocol | default "TCP" }}
      port: {{ .port }}
      targetPort: {{ .targetPort | default .port }}
{{- end }}
{{- end }}

{{- if .ingress }}
{{- $ing := .ingress }}
{{- $hosts := $ing.hosts | default (list $ing.host) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $resourceName }}-ingress
  annotations:
    cert-manager.io/cluster-issuer: "infrastructure-issuer"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
{{- if $ing.www }}
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
{{- end }}
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
{{- if $ing.proxyBodySize }}
    nginx.ingress.kubernetes.io/proxy-body-size: {{ $ing.proxyBodySize | quote }}
{{- end }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
{{- range $hosts }}
        - {{ . | quote }}
{{- end }}
{{- if $ing.www }}
        - {{ printf "www.%s" (first $hosts) | quote }}
{{- end }}
      secretName: {{ $ing.tlsSecret | default (printf "%s-tls" $resourceName) }}
  rules:
{{- range $h := $hosts }}
    - host: {{ $h | quote }}
      http:
        paths:
          - path: {{ $ing.path }}
            pathType: {{ $ing.pathType }}
            backend:
              service:
                name: {{ $resourceName }}-service
                port:
                  number: {{ (index $ports 0).port }}
{{- end }}
{{- end }}
{{- end }}
