version: 0.6.2

namespace: cms
project: cms

services:
  - name: cms
    image: ghcr.io/markmorcos/infrastructure-cms
    context: cms
    port: 8080
    env:
      # Reuses the native Postgres connection string. The secret must exist in
      # the `cms` namespace (created out-of-band, like other repos).
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database-secrets
            key: DATABASE_URL
      # Shared admin token gating the editor UI + /api/admin (out-of-band).
      - name: ADMIN_TOKEN
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: ADMIN_TOKEN
      # Fine-grained PAT used for repository_dispatch on publish (out-of-band).
      - name: GITHUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: GITHUB_TOKEN
      # MinIO runs on the m720q host; the CMS talks to it directly. Public
      # asset URLs go through the CDN ingress instead.
      - name: S3_ENDPOINT
        value: m720q:9000
      - name: S3_BUCKET
        value: cms
      - name: S3_PUBLIC_BASE_URL
        value: https://cdn.morcos.tech
      - name: S3_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: S3_ACCESS_KEY
      - name: S3_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: cms-secrets
            key: S3_SECRET_KEY
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 3
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 20
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    ingress:
      host: cms.morcos.tech
      path: /
      pathType: Prefix
