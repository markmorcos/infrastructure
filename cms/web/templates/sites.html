{{define "sites"}}{{template "head" .}}
<h1>Websites</h1>
<table>
  <tr><th>Website</th><th>Languages</th><th>Repository</th></tr>
  {{range .Sites}}
  <tr>
    <td><a href="/ui/sites/{{.Key}}">{{.Name}}</a></td>
    <td class="muted">{{range .Locales}}{{.}} {{end}}</td>
    <td class="muted"><code>{{.GitHubRepo}}</code></td>
  </tr>
  {{else}}
  <tr><td colspan="3" class="muted">No websites yet — create one via the admin API.</td></tr>
  {{end}}
</table>
{{template "foot" .}}{{end}}
