{{define "head"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} · Experimentation</title>
<style>
  :root { --bg:#0f1020; --card:#1a1b2e; --line:#2a2c45; --text:#e8e8f0; --muted:#9a9ab5; --accent:#ff8a5c; --good:#4ade80; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
  a { color:#9db4ff; text-decoration:none; } a:hover { text-decoration:underline; }
  .bar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid var(--line); }
  .brand { font-weight:700; color:var(--text); }
  .wrap { max-width:900px; margin:0 auto; padding:28px 20px 64px; }
  .narrow { max-width:380px; }
  h1 { font-size:22px; } h2 { font-size:17px; margin-top:32px; } h3 { font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  small { color:var(--muted); font-weight:400; }
  .muted { color:var(--muted); }
  code { background:#00000033; padding:1px 6px; border-radius:5px; font-size:13px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:8px 0; }
  th,td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); font-size:14px; }
  tr:last-child td { border-bottom:none; }
  th { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin:10px 0; }
  .tag { font-size:11px; padding:1px 7px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .sig { font-size:12px; padding:2px 8px; border-radius:999px; background:rgba(74,222,128,.15); color:var(--good); }
  .err { color:var(--accent); }
  input,select,textarea { background:#0c0d18; color:var(--text); border:1px solid var(--line); border-radius:7px; padding:7px 9px; font:inherit; }
  textarea { width:100%; font-family:ui-monospace,monospace; }
  button { background:#3a3d63; color:#fff; border:0; border-radius:7px; padding:8px 14px; font:inherit; cursor:pointer; }
  button:hover { background:#474b78; }
  button.link { background:none; color:var(--muted); padding:0; }
  form.row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:8px; }
  form.col { display:flex; flex-direction:column; gap:8px; max-width:460px; }
  form.col label { display:flex; flex-direction:column; gap:3px; font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<header class="bar">
  <a href="/" class="brand">⚙ Experimentation</a>
  <form method="post" action="/ui/logout"><button class="link">Sign out</button></form>
</header>
<main class="wrap">{{end}}

{{define "foot"}}</main></body></html>{{end}}
