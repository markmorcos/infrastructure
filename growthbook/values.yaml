# GrowthBook — self-hosted experimentation platform
#
# Deployed via the OFFICIAL GrowthBook Helm chart (not charts/infrastructure,
# which is single-host / single-port and has no PVC). The official chart serves
# the frontend (:3000) and backend API (:3100) from one release behind a single
# multi-host ingress, plus an uploads PVC.
#
#   Chart:  oci://ghcr.io/growthbook/charts/growthbook   (pinned 4.4.0)
#   Apply:  see growthbook/README.md
#
# Datastore: EXTERNAL native MongoDB on the host (mongo.morcos.lan); the chart's
# bundled MongoDB subchart is disabled.

# Do not deploy the bundled MongoDB subchart — we use external native Mongo.
mongodb:
  enabled: false

# APP_ORIGIN is a Helm global, so it is injected into both frontend and backend.
global:
  env:
    - name: APP_ORIGIN
      value: https://growthbook.morcos.tech

frontend:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  env:
    - name: API_HOST
      value: https://growthbook-api.morcos.tech

backend:
  # External Mongo: disable the chart's built-in URI builders so it neither emits
  # its own MONGODB_URI nor references the non-existent <release>-mongodb secret.
  # We provide MONGODB_URI ourselves from the `growthbook` secret (see below).
  mongodbEnabled: false
  mongodbUri: ""
  # No PVC — uploads go to MinIO (S3-compatible). See the `env` block + README.
  volumeClaim:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  env:
    - name: MONGODB_URI
      valueFrom:
        secretKeyRef:
          name: growthbook
          key: mongodb-uri
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: growthbook
          key: jwt-secret
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: growthbook
          key: encryption-key
    # ----- Uploads: MinIO (S3-compatible) -----
    # GrowthBook's own S3 client is AWS-only (no endpoint option; issue #2655),
    # but its AWS SDK v3 honours AWS_ENDPOINT_URL_S3, which retargets *only* the
    # S3 client at MinIO without patching GrowthBook. Uploads are server-side
    # (backend -> MinIO); the browser reads images from S3_DOMAIN.
    - name: UPLOAD_METHOD
      value: s3
    - name: S3_BUCKET
      value: growthbook
    - name: S3_REGION
      value: us-east-1
    # Public path-style URL the browser uses to load uploaded images.
    # cdn.morcos.tech is the MinIO API ingress; the `growthbook` bucket must be public-read.
    - name: S3_DOMAIN
      value: https://cdn.morcos.tech/growthbook/
    # Point at MinIO BY IP (http://<node-ip>:9000) so the SDK uses path-style
    # addressing. Lives in the secret because the value is environment-specific.
    - name: AWS_ENDPOINT_URL_S3
      valueFrom:
        secretKeyRef:
          name: growthbook
          key: s3-endpoint
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: growthbook
          key: s3-access-key-id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: growthbook
          key: s3-secret-access-key
    - name: EMAIL_ENABLED
      value: "false"

# One Ingress, both hosts, one certificate (two SANs) — no cert flapping.
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: infrastructure-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # GrowthBook SDK streaming (SSE): don't buffer, keep long-lived connections open.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  hosts:
    - host: growthbook.morcos.tech
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: growthbook-api.morcos.tech
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: growthbook-tls
      hosts:
        - growthbook.morcos.tech
        - growthbook-api.morcos.tech
