# Stable in-cluster aliases for the out-of-cluster data backends. Apps reference
# these by FQDN (e.g. mongo.data.svc.cluster.local) in their secrets instead of
# hard-coding the physical host, so swapping a backend = editing one Service
# here rather than rotating every app secret.
#
# NOTE: deliberately NO `postgres` alias. The deploy pipeline's `migrate` job
# reads each app's DATABASE_URL secret and runs psql from the GitHub Actions
# runner (on the tailnet, OUTSIDE the cluster), where *.svc.cluster.local does
# not resolve. Postgres secrets therefore keep an externally-resolvable host
# (postgres.morcos.lan / m720q), which already resolves in-cluster too. Only
# backends with purely in-cluster consumers get an alias here.
#
# ExternalName is a pure DNS CNAME: no port remap, no LB, no health checks — the
# app must still use the real port. CoreDNS (forward . /etc/resolv.conf) resolves
# the targets, the same path that makes the raw hostnames work today. All four
# backends currently live on one host (Tailscale 100.86.224.60): postgres/mongo/
# redis answer on *.morcos.lan records, while minio's host is the bare Tailscale
# MagicDNS name `m720q` (there is NO m720q.morcos.lan — verified), so it stays
# single-label here.
---
apiVersion: v1
kind: Namespace
metadata:
  name: data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: data
spec:
  type: ExternalName
  externalName: mongo.morcos.lan
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: data
spec:
  type: ExternalName
  externalName: redis.morcos.lan
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data
spec:
  type: ExternalName
  externalName: m720q
  ports:
    - port: 9000
      targetPort: 9000
