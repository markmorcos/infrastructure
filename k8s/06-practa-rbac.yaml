---
# Service account for the practa renderer, scoped to manage custom-domain
# Ingresses in its own namespace only (self-serve custom domains). cert-manager
# auto-issues the TLS cert from the Ingress annotation, so practa needs no
# Certificate/Secret permissions — just Ingresses, in the practa namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: practa
  namespace: practa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: practa-ingress
  namespace: practa
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: practa-ingress
  namespace: practa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: practa-ingress
subjects:
  - kind: ServiceAccount
    name: practa
    namespace: practa
