# Self-hosted, privacy-first web analytics (Plausible Community Edition) for the
# practa tenant sites + other morcos.tech properties. Runs on the m720q k3s
# cluster (amd64). Two stores:
#   - ClickHouse (in-cluster, this file): the event/stats store.
#   - Postgres (existing host backend via the postgres.data ExternalName alias):
#     Plausible's relational metadata DB — no second Postgres needed.
#
# Surfaced in the admin OS under "Analytics" — reverse-proxied at
# admin.morcos.tech/analytics (no separate subdomain), see analytics-ingress.
#
# ── One-time bootstrap (secrets are never committed; create them out-of-band) ──
# 1. On the host Postgres, create the analytics DB + role (CREATEDB lets the app
#    run its own ecto.create on first boot):
#      CREATE ROLE analytics LOGIN PASSWORD '<pw>' CREATEDB;
# 2. Create the secret the analytics Deployment consumes:
#      kubectl -n analytics create secret generic analytics-secrets \
#        --from-literal=SECRET_KEY_BASE=$(openssl rand -base64 48) \
#        --from-literal=TOTP_VAULT_KEY=$(openssl rand -base64 32) \
#        --from-literal=DATABASE_URL='postgres://analytics:<pw>@postgres.data.svc.cluster.local:5432/analytics' \
#        --from-literal=CLICKHOUSE_DATABASE_URL='http://clickhouse.analytics.svc.cluster.local:8123/analytics_events'
# 3. No new DNS: it rides on the existing admin.morcos.tech host under /analytics.
# 4. First run: DISABLE_REGISTRATION below is "false" so you can register the
#    owner account once at https://admin.morcos.tech/analytics/register — then
#    flip it to "true" and re-deploy to lock down sign-ups.
---
apiVersion: v1
kind: Namespace
metadata:
  name: analytics
  labels:
    name: analytics
---
# ── ClickHouse tuning: silence the chatty system log tables that otherwise grow
#    unbounded on a small single-node box (per Plausible's self-hosting guide).
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: analytics
data:
  low-resources.xml: |
    <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
    </clickhouse>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-user-config
  namespace: analytics
data:
  low-resources.xml: |
    <clickhouse>
        <profiles>
            <default>
                <log_queries>0</log_queries>
                <log_query_threads>0</log_query_threads>
            </default>
        </profiles>
    </clickhouse>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: analytics
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: analytics
  labels:
    app: clickhouse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3-alpine
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_SKIP_USER_SETUP
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/low-resources.xml
              subPath: low-resources.xml
            - name: user-config
              mountPath: /etc/clickhouse-server/users.d/low-resources.xml
              subPath: low-resources.xml
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: config
          configMap:
            name: clickhouse-config
        - name: user-config
          configMap:
            name: clickhouse-user-config
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: analytics
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: analytics
  labels:
    app: analytics
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: ghcr.io/plausible/community-edition:v2.1.4
          # Create the relational DB (idempotent), run migrations, then serve.
          command:
            - sh
            - -c
            - "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
          ports:
            - name: http
              containerPort: 8000
          env:
            # Served under /analytics on the admin host via the analytics-proxy.
            # BASE_URL is kept PATHLESS on purpose: Plausible only partially
            # honours a subpath (it prefixes assets/actions but not nav links or
            # redirects), which double-prefixes under rewriting. Pathless → every
            # URL is uniformly root-relative, and the proxy adds /analytics once.
            - name: BASE_URL
              value: "https://admin.morcos.tech"
            # First boot: keep "false" to register the owner account, then flip
            # to "true" and re-deploy to lock sign-ups.
            - name: DISABLE_REGISTRATION
              value: "false"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: SECRET_KEY_BASE
            - name: TOTP_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: TOTP_VAULT_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: DATABASE_URL
            - name: CLICKHOUSE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: CLICKHOUSE_DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: analytics
spec:
  selector:
    app: analytics
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# ── Subpath proxy ─────────────────────────────────────────────────────────────
# Plausible doesn't support running under a subpath (its redirects/links/asset
# URLs are root-relative). This tiny nginx sits in front and rewrites them so the
# whole app works at admin.morcos.tech/analytics: it strips the /analytics prefix
# upstream, re-prefixes Location headers, and sub_filters root-relative URLs in
# HTML/JS/CSS back under /analytics. The ingress points here, not at Plausible.
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-proxy-conf
  namespace: analytics
data:
  default.conf: |
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
      listen 80;
      server_name _;

      # bare /analytics → canonical trailing slash
      location = /analytics { return 308 /analytics/; }

      location /analytics/ {
        # trailing slash on proxy_pass strips the /analytics/ prefix upstream
        proxy_pass http://analytics:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # disable upstream compression so sub_filter can rewrite the body
        proxy_set_header Accept-Encoding "";

        # re-prefix redirect targets that aren't already under /analytics
        proxy_redirect ~^(https?://[^/]+)?(/(?!analytics/).*)$ /analytics$2;

        # With a pathless BASE_URL every app URL is root-relative; prefix them
        # all with /analytics exactly once. HTML attributes cover nav/assets/forms;
        # the JS rules cover the dashboard's fetch + LiveView socket URLs.
        sub_filter_once off;
        sub_filter_types application/javascript text/css;
        sub_filter 'href="/'   'href="/analytics/';
        sub_filter 'src="/'    'src="/analytics/';
        sub_filter 'action="/' 'action="/analytics/';
        sub_filter 'url(/'     'url(/analytics/';
        sub_filter '"/api/'    '"/analytics/api/';
        sub_filter '`/api/'    '`/analytics/api/';
        sub_filter '"/live'    '"/analytics/live';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-proxy
  namespace: analytics
  labels:
    app: analytics-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-proxy
  template:
    metadata:
      labels:
        app: analytics-proxy
      annotations:
        # Bump when analytics-proxy-conf changes so `kubectl apply` rolls the pod
        # (a ConfigMap edit alone doesn't restart it).
        config-rev: "2"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /analytics/api/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              memory: "128Mi"
      volumes:
        - name: conf
          configMap:
            name: analytics-proxy-conf
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-proxy
  namespace: analytics
spec:
  selector:
    app: analytics-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# Routes admin.morcos.tech/analytics to the subpath proxy (above). TLS for
# admin.morcos.tech is provided by the admin app's own ingress (same host, SNI),
# so no tls block / cert is needed here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: analytics-ingress
  namespace: analytics
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: admin.morcos.tech
      http:
        paths:
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-proxy
                port:
                  number: 80
