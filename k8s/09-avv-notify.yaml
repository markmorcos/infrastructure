# Daily nudge that emails tenants to re-accept the AVV after a version bump.
# It just POSTs the practa endpoint, which is idempotent (only emails tenants
# whose accepted version is stale AND not yet notified for the current version,
# then marks them notified). So running daily = "auto within a day of a bump",
# with no duplicate emails. Runs in the `practa` namespace.
#
# Requires a secret `practa-cron` with key CRON_SECRET, and the SAME value set as
# CRON_SECRET in the practa deployment env (the endpoint validates the bearer).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: avv-notify
  namespace: practa
spec:
  schedule: "23 5 * * *" # daily 05:23
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: avv-notify
              image: curlimages/curl:8.10.1
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: practa-cron
                      key: CRON_SECRET
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  curl -sfSL -X POST \
                    -H "Authorization: Bearer ${CRON_SECRET}" \
                    "http://practa-practa-service.practa.svc.cluster.local:3000/api/cron/avv-notify/"
